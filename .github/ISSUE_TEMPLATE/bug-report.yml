name: Bug report
description: Something in the Flashbay app is broken or behaving wrong.
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web (Chrome)
        - Web (Safari)
        - Web (Firefox)
        - Web (Edge)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Tap on …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console / error output (if any)
      render: shell
    validations:
      required: false
